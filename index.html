<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stammbaum – Samuel Ferreira Inocêncio</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --verde: #00ff88;
        --verde-escuro: #00cc66;
        --verde-sombra: rgba(0, 255, 136, 0.15);
        --verde-sombra-forte: rgba(0, 255, 136, 0.25);
        --fundo: #080808;
        --fundo-card: #101010;
        --fundo-card2: #141414;
        --fundo-modal: #0e0e0e;
        --texto: #e8e8e8;
        --texto-suave: #777777;
        --borda: #1c1c1c;
        --borda-hover: #2a2a2a;
        --cinza-morto: grayscale(85%) brightness(0.5) contrast(0.9);
      }

      *, *::before, *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html { scroll-behavior: smooth; }

      body {
        background-color: var(--fundo);
        color: var(--texto);
        font-family: "Rajdhani", sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ────────────────────────────────────────
         PARTIKELN IM HINTERGRUND
      ──────────────────────────────────────── */
      .hintergrund-partikel {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
      }

      .partikel {
        position: absolute;
        width: 2px;
        height: 2px;
        background: var(--verde);
        border-radius: 50%;
        opacity: 0;
        animation: partikelFloat linear infinite;
      }

      @keyframes partikelFloat {
        0%   { opacity: 0; transform: translateY(0) scale(1); }
        10%  { opacity: 0.4; }
        90%  { opacity: 0.1; }
        100% { opacity: 0; transform: translateY(-100vh) scale(0.5); }
      }

      /* ────────────────────────────────────────
         HEADER
      ──────────────────────────────────────── */
      header {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 70px 20px 50px;
        border-bottom: 1px solid var(--borda);
      }

      header::before {
        content: "";
        position: absolute;
        bottom: 0; left: 50%;
        transform: translateX(-50%);
        width: 300px;
        height: 1px;
        background: linear-gradient(to right, transparent, var(--verde), transparent);
        opacity: 0.5;
      }

      .header-etikette {
        font-family: "Orbitron", sans-serif;
        font-size: 0.65rem;
        letter-spacing: 6px;
        color: var(--verde);
        text-transform: uppercase;
        opacity: 0.6;
        margin-bottom: 16px;
        display: block;
      }

      header h1 {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(1.6rem, 4.5vw, 3rem);
        color: var(--verde);
        letter-spacing: 6px;
        text-transform: uppercase;
        margin-bottom: 12px;
        text-shadow: 0 0 40px rgba(0, 255, 136, 0.3);
        animation: titelGlanz 4s ease-in-out infinite;
      }

      @keyframes titelGlanz {
        0%, 100% { text-shadow: 0 0 30px rgba(0, 255, 136, 0.3); }
        50%       { text-shadow: 0 0 60px rgba(0, 255, 136, 0.6); }
      }

      header p {
        font-size: 1.1rem;
        color: var(--texto-suave);
        letter-spacing: 3px;
        font-weight: 300;
      }

      /* ────────────────────────────────────────
         STAMMBAUM – LAYOUT
      ──────────────────────────────────────── */
      .stammbaum {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 70px 20px 100px;
        max-width: 1400px;
        margin: 0 auto;
        gap: 0;
      }

      .ebene {
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 100%;
      }

      .ebene-label {
        font-family: "Orbitron", sans-serif;
        font-size: 0.62rem;
        letter-spacing: 5px;
        color: var(--verde);
        text-transform: uppercase;
        margin-bottom: 32px;
        opacity: 0.55;
        position: relative;
        padding: 0 20px;
      }

      .ebene-label::before,
      .ebene-label::after {
        content: "";
        position: absolute;
        top: 50%;
        width: 40px;
        height: 1px;
        background: var(--verde);
        opacity: 0.3;
      }

      .ebene-label::before { right: 100%; margin-right: -20px; }
      .ebene-label::after  { left: 100%;  margin-left: -20px; }

      .ebene-reihe {
        display: flex;
        justify-content: center;
        gap: 22px;
        flex-wrap: wrap;
        width: 100%;
      }

      /* ────────────────────────────────────────
         VERBINDUNGSLINIEN
      ──────────────────────────────────────── */
      .verbindung-vertikal {
        width: 2px;
        height: 64px;
        background: linear-gradient(
          to bottom,
          var(--verde-escuro),
          transparent
        );
        opacity: 0.35;
        margin: 0 auto;
      }

      .verbindung-horizontal {
        width: 100%;
        height: 64px;
        position: relative;
      }

      .verbindung-horizontal::before {
        content: "";
        position: absolute;
        top: 0; left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 100%;
        background: linear-gradient(
          to bottom,
          transparent,
          var(--verde-escuro)
        );
        opacity: 0.35;
      }

      /* ────────────────────────────────────────
         CARDS – BASE
      ──────────────────────────────────────── */
      .card {
        background: var(--fundo-card);
        border: 1px solid var(--borda);
        border-radius: 16px;
        width: 200px;
        text-align: center;
        cursor: pointer;
        opacity: 0;
        transform: translateY(40px);
        position: relative;
        overflow: hidden;
        transition:
          transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }

      /* Linha superior brilhante */
      .card::before {
        content: "";
        position: absolute;
        top: 0; left: 0;
        width: 100%;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--verde),
          transparent
        );
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      /* Brilho de fundo no hover */
      .card::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 50% 0%,
          rgba(0, 255, 136, 0.04) 0%,
          transparent 70%
        );
        opacity: 0;
        transition: opacity 0.3s ease;
      }

      .card:hover {
        transform: translateY(-8px);
        border-color: rgba(0, 255, 136, 0.4);
        box-shadow:
          0 16px 50px var(--verde-sombra),
          0 0 0 1px rgba(0, 255, 136, 0.1);
      }

      .card:hover::before,
      .card:hover::after { opacity: 1; }

      .card.animado {
        opacity: 1;
        transform: translateY(0);
        transition:
          opacity 0.7s ease,
          transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
          border-color 0.3s ease,
          box-shadow 0.3s ease;
      }

      /* ── Card casal ── */
      .card-casal { width: 300px; }

      /* ── Card Ich ── */
      .card-ich {
        width: 220px;
        border-color: rgba(0, 255, 136, 0.35);
        box-shadow: 0 0 40px var(--verde-sombra);
        background: var(--fundo-card2);
      }

      /* ────────────────────────────────────────
         FOTOS – CARDS
      ──────────────────────────────────────── */

      /* Círculo individual */
      .foto-circulo-wrap {
        width: 104px;
        height: 104px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid var(--verde-escuro);
        margin: 26px auto 18px;
        position: relative;
        transition: border-color 0.3s ease, box-shadow 0.3s ease;
      }

      .card:hover .foto-circulo-wrap {
        border-color: var(--verde);
        box-shadow: 0 0 20px var(--verde-sombra);
      }

      .foto-circulo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .foto-circulo-wrap.falecido {
        border-color: #2e2e2e;
      }

      .foto-circulo-wrap.falecido img {
        filter: var(--cinza-morto);
      }

      /* Card Ich: círculo maior */
      .card-ich .foto-circulo-wrap {
        width: 116px;
        height: 116px;
        border-color: var(--verde);
        border-width: 3px;
        box-shadow: 0 0 24px var(--verde-sombra);
      }

      /* Fallback silhueta */
      .foto-fallback {
        width: 104px;
        height: 104px;
        border-radius: 50%;
        background: #131320;
        border: 2px solid #222;
        margin: 26px auto 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.6rem;
      }

      /* Foto retangular – casal */
      .foto-retangulo-wrap {
        width: 100%;
        height: 210px;
        overflow: hidden;
        position: relative;
      }

      .foto-retangulo-wrap img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.5s ease;
      }

      .card-casal:hover .foto-retangulo-wrap img {
        transform: scale(1.05);
      }

      .foto-retangulo-fallback {
        width: 100%;
        height: 110px;
        background: #0d0d0d;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
      }

      /* ────────────────────────────────────────
         CARD – CONTEÚDO TEXTUAL
      ──────────────────────────────────────── */
      .card-corpo { padding: 0 18px 22px; }
      .card-casal .card-corpo { padding: 18px 20px 22px; }

      .card-nome {
        font-family: "Orbitron", sans-serif;
        font-size: 0.68rem;
        color: var(--verde);
        letter-spacing: 1.5px;
        margin-bottom: 7px;
        text-transform: uppercase;
        line-height: 1.3;
      }

      .card-parentesco {
        font-size: 1.1rem;
        color: var(--texto);
        font-weight: 700;
        margin-bottom: 6px;
        letter-spacing: 0.5px;
      }

      .card-info {
        font-size: 0.9rem;
        color: var(--texto-suave);
        font-weight: 300;
        margin-bottom: 14px;
        line-height: 1.6;
      }

      /* ── Badges ── */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        font-family: "Orbitron", sans-serif;
        font-size: 0.6rem;
        letter-spacing: 2px;
        padding: 5px 14px;
        border-radius: 20px;
        text-transform: uppercase;
        font-weight: 700;
      }

      .badge-lebend {
        background: rgba(0, 255, 136, 0.08);
        color: var(--verde);
        border: 1px solid rgba(0, 255, 136, 0.25);
      }

      .badge-verstorben {
        background: rgba(80, 80, 80, 0.08);
        color: #4a4a4a;
        border: 1px solid #1e1e1e;
      }

      .badge-ich {
        background: rgba(0, 255, 136, 0.12);
        color: var(--verde);
        border: 1px solid rgba(0, 255, 136, 0.4);
        box-shadow: 0 0 10px rgba(0, 255, 136, 0.15);
      }

      /* ────────────────────────────────────────
         MODAL
      ──────────────────────────────────────── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.92);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
        backdrop-filter: blur(8px);
      }

      .modal-overlay.ativo {
        opacity: 1;
        pointer-events: all;
      }

      .modal {
        background: var(--fundo-modal);
        border: 1px solid rgba(0, 255, 136, 0.2);
        border-radius: 20px;
        max-width: 600px;
        width: 100%;
        position: relative;
        transform: scale(0.9) translateY(20px);
        transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        box-shadow:
          0 30px 80px rgba(0, 0, 0, 0.8),
          0 0 0 1px rgba(0, 255, 136, 0.05),
          inset 0 1px 0 rgba(0, 255, 136, 0.1);
        overflow: hidden;
      }

      .modal-overlay.ativo .modal {
        transform: scale(1) translateY(0);
      }

      .modal-fechar {
        position: absolute;
        top: 16px; right: 18px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid var(--borda);
        color: var(--texto-suave);
        font-size: 1.1rem;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        z-index: 10;
      }

      .modal-fechar:hover {
        background: rgba(0, 255, 136, 0.1);
        border-color: var(--verde);
        color: var(--verde);
      }

      /* Foto no topo do modal */
      .modal-foto-topo {
        width: 100%;
        height: 260px;
        object-fit: cover;
        display: block;
      }

      .modal-foto-topo.falecido {
        filter: var(--cinza-morto);
      }

      .modal-foto-placeholder {
        width: 100%;
        height: 130px;
        background: linear-gradient(to bottom, #0d0d1a, var(--fundo-modal));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        opacity: 0.5;
      }

      /* Gradiente sobre a foto */
      .modal-foto-gradiente {
        position: relative;
        overflow: hidden;
      }

      .modal-foto-gradiente::after {
        content: "";
        position: absolute;
        bottom: 0; left: 0;
        width: 100%;
        height: 80px;
        background: linear-gradient(to top, var(--fundo-modal), transparent);
        pointer-events: none;
      }

      /* Corpo do modal */
      .modal-corpo { padding: 28px 36px 36px; }

      .modal-titulo {
        font-family: "Orbitron", sans-serif;
        font-size: 1rem;
        color: var(--verde);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 5px;
        line-height: 1.3;
      }

      .modal-subtitulo {
        font-size: 1rem;
        color: var(--texto-suave);
        margin-bottom: 22px;
        font-weight: 300;
      }

      .modal-divisor {
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          rgba(0, 255, 136, 0.3),
          transparent
        );
        margin: 20px 0;
      }

      .modal-campos { display: flex; flex-direction: column; gap: 14px; }

      .modal-campo { display: flex; gap: 16px; align-items: baseline; }

      .modal-label {
        font-family: "Orbitron", sans-serif;
        font-size: 0.58rem;
        letter-spacing: 2.5px;
        color: var(--verde);
        text-transform: uppercase;
        min-width: 120px;
        opacity: 0.8;
      }

      .modal-valor {
        font-size: 1rem;
        color: var(--texto);
        font-weight: 400;
        line-height: 1.5;
      }

      /* Grid casal no modal */
      .modal-casal-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }

      .modal-casal-pessoa h3 {
        font-family: "Orbitron", sans-serif;
        font-size: 0.68rem;
        color: var(--verde);
        letter-spacing: 1.5px;
        text-transform: uppercase;
        margin-bottom: 14px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--borda);
      }

      .modal-casal-pessoa .modal-campo {
        flex-direction: column;
        gap: 3px;
        margin-bottom: 10px;
      }

      .modal-casal-pessoa .modal-label { min-width: unset; }
      .modal-casal-pessoa .modal-valor { font-size: 0.95rem; }

      /* ────────────────────────────────────────
         RESPONSIVO
      ──────────────────────────────────────── */
      @media (max-width: 720px) {
        .ebene-reihe { flex-direction: column; align-items: center; }
        .card, .card-casal, .card-ich { width: 90%; max-width: 340px; }
        .modal-casal-grid { grid-template-columns: 1fr; }
        .modal-corpo { padding: 22px; }
        .modal-foto-topo { height: 200px; }
      }
    </style>
  </head>
  <body>

    <!-- Partículas de fundo -->
    <div class="hintergrund-partikel" id="partikel-container"></div>

    <header>
      <span class="header-etikette">Deutschkurs – Präsentation</span>
      <h1>Stammbaum</h1>
      <p>Familie Ferreira Inocêncio</p>
    </header>

    <main class="stammbaum">

      <!-- Ebene 1: Großeltern -->
      <div class="ebene">
        <span class="ebene-label">Großeltern — Väterlicherseits & Mütterlicherseits</span>
        <div class="ebene-reihe" id="ebene-grosseltern"></div>
      </div>

      <div class="verbindung-horizontal"></div>

      <!-- Ebene 2: Eltern -->
      <div class="ebene">
        <span class="ebene-label">Eltern</span>
        <div class="ebene-reihe" id="ebene-eltern"></div>
      </div>

      <div class="verbindung-horizontal"></div>

      <!-- Ebene 3: Kinder -->
      <div class="ebene">
        <span class="ebene-label">Kinder</span>
        <div class="ebene-reihe" id="ebene-kinder"></div>
      </div>

    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <button class="modal-fechar" id="modal-fechar">✕</button>
        <div id="modal-corpo"></div>
      </div>
    </div>

    <script>
      /* ════════════════════════════════════════
         FAMILIENDATEN
      ════════════════════════════════════════ */
      const familie = {

        grosseltern: [
          {
            id: "amado",
            name: "Amado",
            verwandtschaft: "Großvater",
            seite: "Väterlicherseits",
            beruf: "Unbekannt",
            status: "verstorben",
            foto: "fotos/amado.jpg",
            fotoPosCard:  "top center",
            fotoPosModal: "top center",
            anmerkung: "Verstorben, bevor ich geboren wurde",
          },
          {
            id: "joana",
            name: "Joana",
            verwandtschaft: "Großmutter",
            seite: "Väterlicherseits",
            beruf: "Unbekannt",
            status: "verstorben",
            foto: "fotos/joana.jpg",
            fotoPosCard:  "top center",
            fotoPosModal: "top center",
            anmerkung: "Verstorben mit 64 Jahren, vor 22 Jahren",
          },
          {
            id: "antonio",
            name: "António Ferreira",
            verwandtschaft: "Großvater",
            seite: "Mütterlicherseits",
            beruf: "Landarbeiter",
            status: "verstorben",
            foto: "fotos/antonio.png",
            fotoPosCard:  "top center",
            fotoPosModal: "center top",
            anmerkung: "Verstorben mit 72 Jahren",
          },
          {
            id: "candida",
            name: "Cândida de Jesus",
            verwandtschaft: "Großmutter",
            seite: "Mütterlicherseits",
            beruf: "Hausfrau",
            status: "lebend",
            foto: "fotos/candida.png",
            fotoPosCard:  "50% 10%",
            fotoPosModal: "center 10%",
            anmerkung: "85 Jahre alt, noch am Leben",
          },
        ],

        eltern: {
          foto: "fotos/pais.png",
          fotoPosCard:  "top center",
          fotoPosModal: "center 20%",
          personen: [
            {
              name: "José Maria",
              verwandtschaft: "Vater",
              beruf: "Kfz-Elektriker",
              status: "Im Ruhestand",
            },
            {
              name: "Alacir",
              verwandtschaft: "Mutter",
              beruf: "Gemeindegesundheitsarbeiterin",
              status: "Im Ruhestand",
            },
          ],
        },

        kinder: [
          {
            id: "sergio",
            name: "Sérgio",
            verwandtschaft: "Bruder",
            beruf: "Schauspieler und Rechtsanwalt",
            status: "lebend",
            foto: "fotos/sergio.png",
            fotoPosCard:  "center",
            fotoPosModal: "center",
            anmerkung: "Schauspieler und Rechtsanwalt",
            ichBin: false,
          },
          {
            id: "samuel",
            name: "Samuel Ferreira Inocêncio",
            verwandtschaft: "Ich",
            beruf: "Beamter an der UFG",
            interesse: "Technologie-Enthusiast",
            status: "lebend",
            foto: "fotos/samuel.png",
            fotoPosCard:  "top center",
            fotoPosModal: "center 20%",
            anmerkung: "Beamter an der UFG · Technologie-Enthusiast",
            ichBin: true,
          },
        ],

      };

      /* ════════════════════════════════════════
         FOTO HELPERS
      ════════════════════════════════════════ */

      function criarFotoCirculo(src, alt, falecido, posCard) {
        const wrap = document.createElement("div");
        wrap.className = "foto-circulo-wrap" + (falecido ? " falecido" : "");

        const img = document.createElement("img");
        img.src = src;
        img.alt = alt;
        img.style.objectPosition = posCard;
        img.onerror = () => {
          const fb = document.createElement("div");
          fb.className = "foto-fallback";
          if (falecido) fb.style.opacity = "0.3";
          fb.textContent = "👤";
          wrap.replaceWith(fb);
        };

        wrap.appendChild(img);
        return wrap;
      }

      /* ════════════════════════════════════════
         CARD BUILDERS
      ════════════════════════════════════════ */

      function criarCardGrosselternteil(p) {
        const card = document.createElement("div");
        card.className = "card";
        const falecido = p.status === "verstorben";

        card.appendChild(criarFotoCirculo(p.foto, p.name, falecido, p.fotoPosCard));

        const corpo = document.createElement("div");
        corpo.className = "card-corpo";
        corpo.innerHTML = `
          <div class="card-nome">${p.name}</div>
          <div class="card-parentesco">${p.verwandtschaft}</div>
          <div class="card-info">${p.seite}<br>${p.beruf}</div>
          <span class="badge ${falecido ? 'badge-verstorben' : 'badge-lebend'}">
            ${falecido ? '† Verstorben' : 'Lebend'}
          </span>
        `;
        card.appendChild(corpo);
        card.addEventListener("click", () => modalPerson(p));
        return card;
      }

      function criarCardEltern(e) {
        const card = document.createElement("div");
        card.className = "card card-casal";

        const wrap = document.createElement("div");
        wrap.className = "foto-retangulo-wrap modal-foto-gradiente";

        const img = document.createElement("img");
        img.src = e.foto;
        img.alt = "Eltern";
        img.style.objectPosition = e.fotoPosCard;
        img.onerror = () => {
          wrap.innerHTML = `<div class="foto-retangulo-fallback">👫</div>`;
        };
        wrap.appendChild(img);
        card.appendChild(wrap);

        const corpo = document.createElement("div");
        corpo.className = "card-corpo";
        corpo.innerHTML = `
          <div class="card-nome">${e.personen[0].name} & ${e.personen[1].name}</div>
          <div class="card-parentesco">Vater & Mutter</div>
          <div class="card-info">Im Ruhestand</div>
          <span class="badge badge-lebend">Lebend</span>
        `;
        card.appendChild(corpo);
        card.addEventListener("click", () => modalEltern(e));
        return card;
      }

      function criarCardKind(p) {
        const card = document.createElement("div");
        card.className = "card" + (p.ichBin ? " card-ich" : "");

        card.appendChild(criarFotoCirculo(p.foto, p.name, false, p.fotoPosCard));

        const corpo = document.createElement("div");
        corpo.className = "card-corpo";
        corpo.innerHTML = `
          <div class="card-nome">${p.name}</div>
          <div class="card-parentesco">${p.verwandtschaft}</div>
          <div class="card-info">${p.beruf}${p.interesse ? '<br>' + p.interesse : ''}</div>
          <span class="badge ${p.ichBin ? 'badge-ich' : 'badge-lebend'}">
            ${p.ichBin ? 'Ich' : 'Lebend'}
          </span>
        `;
        card.appendChild(corpo);
        card.addEventListener("click", () => modalKind(p));
        return card;
      }

      /* ════════════════════════════════════════
         MODAL BUILDERS
      ════════════════════════════════════════ */

      function abrirModal(html) {
        document.getElementById("modal-corpo").innerHTML = html;
        document.getElementById("modal-overlay").classList.add("ativo");
        document.body.style.overflow = "hidden";
      }

      function fecharModal() {
        document.getElementById("modal-overlay").classList.remove("ativo");
        document.body.style.overflow = "";
      }

      function fotoTopoHtml(src, alt, falecido, posModal) {
        return `
          <div class="modal-foto-gradiente">
            <img
              src="${src}"
              alt="${alt}"
              class="modal-foto-topo ${falecido ? 'falecido' : ''}"
              style="object-position: ${posModal}"
              onerror="this.parentElement.innerHTML='<div class=\\'modal-foto-placeholder\\'>👤</div>'"
            />
          </div>
        `;
      }

      function modalPerson(p) {
        const falecido = p.status === "verstorben";
        abrirModal(`
          ${fotoTopoHtml(p.foto, p.name, falecido, p.fotoPosModal)}
          <div class="modal-corpo">
            <div class="modal-titulo">${p.name}</div>
            <div class="modal-subtitulo">${p.verwandtschaft} — ${p.seite}</div>
            <div class="modal-divisor"></div>
            <div class="modal-campos">
              <div class="modal-campo">
                <span class="modal-label">Beruf</span>
                <span class="modal-valor">${p.beruf}</span>
              </div>
              <div class="modal-campo">
                <span class="modal-label">Status</span>
                <span class="modal-valor">
                  <span class="badge ${falecido ? 'badge-verstorben' : 'badge-lebend'}">
                    ${falecido ? '† Verstorben' : 'Lebend'}
                  </span>
                </span>
              </div>
              <div class="modal-campo">
                <span class="modal-label">Anmerkung</span>
                <span class="modal-valor">${p.anmerkung}</span>
              </div>
            </div>
          </div>
        `);
      }

      function modalEltern(e) {
        const p1 = e.personen[0];
        const p2 = e.personen[1];
        abrirModal(`
          <div class="modal-foto-gradiente">
            <img
              src="${e.foto}"
              alt="Eltern"
              class="modal-foto-topo"
              style="object-position: ${e.fotoPosModal}"
              onerror="this.parentElement.innerHTML='<div class=\\'modal-foto-placeholder\\'>👫</div>'"
            />
          </div>
          <div class="modal-corpo">
            <div class="modal-titulo">Vater & Mutter</div>
            <div class="modal-subtitulo">Im Ruhestand — Lebend</div>
            <div class="modal-divisor"></div>
            <div class="modal-casal-grid">
              <div class="modal-casal-pessoa">
                <h3>${p1.name}</h3>
                <div class="modal-campo">
                  <span class="modal-label">Verwandtschaft</span>
                  <span class="modal-valor">${p1.verwandtschaft}</span>
                </div>
                <div class="modal-campo">
                  <span class="modal-label">Beruf</span>
                  <span class="modal-valor">${p1.beruf}</span>
                </div>
                <div class="modal-campo">
                  <span class="modal-label">Status</span>
                  <span class="modal-valor">${p1.status}</span>
                </div>
              </div>
              <div class="modal-casal-pessoa">
                <h3>${p2.name}</h3>
                <div class="modal-campo">
                  <span class="modal-label">Verwandtschaft</span>
                  <span class="modal-valor">${p2.verwandtschaft}</span>
                </div>
                <div class="modal-campo">
                  <span class="modal-label">Beruf</span>
                  <span class="modal-valor">${p2.beruf}</span>
                </div>
                <div class="modal-campo">
                  <span class="modal-label">Status</span>
                  <span class="modal-valor">${p2.status}</span>
                </div>
              </div>
            </div>
          </div>
        `);
      }

      function modalKind(p) {
        abrirModal(`
          ${fotoTopoHtml(p.foto, p.name, false, p.fotoPosModal)}
          <div class="modal-corpo">
            <div class="modal-titulo">${p.name}</div>
            <div class="modal-subtitulo">${p.verwandtschaft}</div>
            <div class="modal-divisor"></div>
            <div class="modal-campos">
              <div class="modal-campo">
                <span class="modal-label">Beruf</span>
                <span class="modal-valor">${p.beruf}</span>
              </div>
              ${p.interesse ? `
              <div class="modal-campo">
                <span class="modal-label">Interesse</span>
                <span class="modal-valor">${p.interesse}</span>
              </div>` : ''}
              <div class="modal-campo">
                <span class="modal-label">Status</span>
                <span class="modal-valor">
                  <span class="badge ${p.ichBin ? 'badge-ich' : 'badge-lebend'}">
                    ${p.ichBin ? 'Ich' : 'Lebend'}
                  </span>
                </span>
              </div>
            </div>
          </div>
        `);
      }

      /* ════════════════════════════════════════
         ANIMAÇÃO DE ENTRADA
      ════════════════════════════════════════ */
      function animarCards() {
        document.querySelectorAll(".card").forEach((card, i) => {
          setTimeout(() => card.classList.add("animado"), i * 140);
        });
      }

      /* ════════════════════════════════════════
         PARTÍCULAS DE FUNDO
      ════════════════════════════════════════ */
      function criarParticulas() {
        const container = document.getElementById("partikel-container");
        for (let i = 0; i < 30; i++) {
          const p = document.createElement("div");
          p.className = "partikel";
          p.style.left = Math.random() * 100 + "vw";
          p.style.bottom = "-4px";
          p.style.animationDuration = (8 + Math.random() * 16) + "s";
          p.style.animationDelay = (Math.random() * 12) + "s";
          p.style.width = p.style.height = (1 + Math.random() * 3) + "px";
          p.style.opacity = "0";
          container.appendChild(p);
        }
      }

      /* ════════════════════════════════════════
         INICIALIZAÇÃO
      ════════════════════════════════════════ */
      function inicializar() {
        criarParticulas();

        const ebGross = document.getElementById("ebene-grosseltern");
        familie.grosseltern.forEach(g => ebGross.appendChild(criarCardGrosselternteil(g)));

        const ebEltern = document.getElementById("ebene-eltern");
        ebEltern.appendChild(criarCardEltern(familie.eltern));

        const ebKinder = document.getElementById("ebene-kinder");
        familie.kinder.forEach(k => ebKinder.appendChild(criarCardKind(k)));

        setTimeout(animarCards, 150);
      }

      /* ════════════════════════════════════════
         EVENTOS
      ════════════════════════════════════════ */
      document.getElementById("modal-fechar").addEventListener("click", fecharModal);

      document.getElementById("modal-overlay").addEventListener("click", (e) => {
        if (e.target === document.getElementById("modal-overlay")) fecharModal();
      });

      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") fecharModal();
      });

      inicializar();
    </script>
  </body>
</html>
